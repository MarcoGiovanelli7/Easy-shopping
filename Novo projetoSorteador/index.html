<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteador de Imagens</title>.titulo{
    color: #FFD700;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,215,0,.7);
}

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:#1a1a1a;
    font-family:Arial, sans-serif;
}

.janela{
    width:350px;
    height:350px;
    background:#67eeee;
    border-radius:15%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.4);
    border: 10px solid #fb0505;
}

#imagemAtual{
    width:90%;
    height:90%;
    object-fit:contain;
}

button{
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    border:7px solid #fb0505;
    border-radius:15px;
}

input{
    color:white;
}

</style>

</head>
<body>
    
<h1 >Sorteador Dinâmico</h1>

<input type="file" id="upload" multiple accept="image/*">


<div class="janela">
    <img id="imagemAtual" alt="Imagem sorteada">
</div>

<button id="btnParar">PARAR</button>

<script>

const upload = document.getElementById("upload");
const imagemAtual = document.getElementById("imagemAtual");
const btnParar = document.getElementById("btnParar");

let imagens = [];
let intervalo;
let rodando = false;

upload.addEventListener("change", () => {

    imagens = [];

    for(const arquivo of upload.files){
        imagens.push(URL.createObjectURL(arquivo));
    }

    if(imagens.length > 0){
        iniciar();
    }

});

function iniciar(){

    clearInterval(intervalo);

    rodando = true;

    intervalo = setInterval(() => {

        const indice =
            Math.floor(Math.random() * imagens.length);

        imagemAtual.src = imagens[indice];

    }, 30);

}

btnParar.addEventListener("click", () => {

    if(imagens.length === 0){
        alert("Selecione algumas imagens primeiro!");
        return;
    }

    if(rodando){

        clearInterval(intervalo);
        btnParar.textContent = "INICIAR";
        rodando = false;

    }else{

        iniciar();
        btnParar.textContent = "PARAR";
    }

});

</script>

</body>
</html>
